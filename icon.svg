<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with mystical gradient -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="moonGradient" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#f4f1de;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4cfc7;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="url(#bgGradient)"/>

  <!-- Outer ring decoration -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#c9a876" stroke-width="1.5" opacity="0.6"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#c9a876" stroke-width="0.5" opacity="0.4"/>

  <!-- Crescent moon with glow -->
  <g filter="url(#glow)">
    <!-- Full moon -->
    <circle cx="128" cy="92" r="42" fill="url(#moonGradient)" opacity="0.95"/>
    <!-- Shadow to create crescent -->
    <circle cx="142" cy="92" r="42" fill="#1a1a2e"/>
  </g>

  <!-- Stars around the moon -->
  <circle cx="90" cy="70" r="2" fill="#f4f1de" opacity="0.8"/>
  <circle cx="165" cy="65" r="1.5" fill="#f4f1de" opacity="0.6"/>
  <circle cx="85" cy="120" r="1" fill="#f4f1de" opacity="0.5"/>
  <circle cx="170" cy="125" r="1.5" fill="#f4f1de" opacity="0.6"/>

  <!-- Earth symbol at bottom (subtle) -->
  <g transform="translate(128, 160)" opacity="0.7">
    <circle r="18" fill="none" stroke="#7cb9e8" stroke-width="1.5"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#7cb9e8" stroke-width="1"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#7cb9e8" stroke-width="1"/>
    <path d="M -12 -12 Q 0 -8 12 -12" fill="none" stroke="#2d5016" stroke-width="1.5"/>
  </g>

  <!-- Decorative corners (tarot-like) -->
  <g opacity="0.5">
    <circle cx="20" cy="20" r="1.5" fill="#c9a876"/>
    <circle cx="236" cy="20" r="1.5" fill="#c9a876"/>
    <circle cx="20" cy="236" r="1.5" fill="#c9a876"/>
    <circle cx="236" cy="236" r="1.5" fill="#c9a876"/>
  </g>
</svg>
