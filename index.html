<style>
  :root {
    --bg: #0d0b1e;
    --bg-deep: #05040f;
    --gold: #d4af6a;
    --gold-bright: #f0d49a;
    --gold-dim: #8a7550;
    --ink: #e8dcc0;
    --ink-dim: #a5987d;
    --card: #131028;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at 50% 38%, #1a1633 0%, var(--bg) 55%, var(--bg-deep) 100%);
    color: var(--ink);
    font-family: "Cormorant Garamond", Georgia, serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Tarot card frame ─────────────────────────────── */
  .frame {
    position: fixed;
    inset: max(8px, env(safe-area-inset-top)) 8px max(8px, env(safe-area-inset-bottom)) 8px;
    border: 1px solid var(--gold-dim);
    outline: 1px solid var(--gold);
    outline-offset: 3px;
    pointer-events: none;
    z-index: 5;
  }
  .corner { position: absolute; width: 34px; height: 34px; color: var(--gold); }
  .corner svg { width: 100%; height: 100%; display: block; }
  .corner.tl { top: -5px; left: -5px; }
  .corner.tr { top: -5px; right: -5px; transform: scaleX(-1); }
  .corner.bl { bottom: -5px; left: -5px; transform: scaleY(-1); }
  .corner.br { bottom: -5px; right: -5px; transform: scale(-1); }

  /* ── Layout ───────────────────────────────────────── */
  .card {
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom)) 18px;
    gap: 4px;
  }
  header, footer { text-align: center; z-index: 2; }

  h1 {
    font-family: Cinzel, Georgia, serif;
    font-weight: 600;
    font-size: clamp(1.15rem, 5.6vw, 1.7rem);
    letter-spacing: 0.14em;
    color: var(--gold-bright);
    text-shadow: 0 0 18px rgba(212, 175, 106, 0.35);
  }
  h1 .star { color: var(--gold); font-size: 0.75em; vertical-align: 0.12em; }
  .subtitle {
    font-style: italic;
    font-size: clamp(0.95rem, 4vw, 1.15rem);
    color: var(--ink-dim);
    letter-spacing: 0.06em;
  }

  .dial-wrap { position: relative; min-height: 0; min-width: 0; }
  .dial-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ── Cartouche (phase info) ───────────────────────── */
  .cartouche {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 6px 10px 2px;
  }
  .portrait-moon { width: 56px; height: 56px; flex: none; filter: drop-shadow(0 0 6px rgba(240, 212, 154, 0.25)); }
  .phase-text { text-align: left; }
  .phase-name {
    font-family: Cinzel, Georgia, serif;
    font-size: clamp(1.02rem, 4.6vw, 1.3rem);
    color: var(--gold-bright);
    letter-spacing: 0.08em;
  }
  .phase-detail {
    font-size: clamp(0.86rem, 3.6vw, 1rem);
    color: var(--ink-dim);
    font-style: italic;
    line-height: 1.35;
  }
  .credits {
    margin-top: 4px;
    font-family: Cinzel, Georgia, serif;
    font-size: clamp(0.66rem, 2.8vw, 0.78rem);
    letter-spacing: 0.18em;
    color: var(--gold);
    opacity: 0.85;
    text-transform: uppercase;
  }
  .source {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    opacity: 0.6;
    font-style: italic;
    margin-top: 2px;
  }

  /* ── Landscape: the plot stays put, only the texts turn ── */
  @media (orientation: landscape) {
    .card {
      grid-template-rows: 1fr;
      grid-template-columns: auto 1fr auto;
      align-items: center;
    }
    .dial-wrap { align-self: stretch; }
    header { writing-mode: vertical-rl; transform: rotate(180deg); justify-self: start; }
    footer { writing-mode: vertical-rl; justify-self: end; }
    .cartouche { flex-direction: column; gap: 10px; }
    .phase-text { text-align: left; }
    .portrait-moon { width: 48px; height: 48px; }
    .source { display: none; }
  }

  /* ── Animations ───────────────────────────────────── */
  @keyframes twinkle { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
  .tw { animation: twinkle 3.4s ease-in-out infinite; }
  @keyframes breathe { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }
  .sun-halo { animation: breathe 7s ease-in-out infinite; }
</style>

<script>
(function () {
  "use strict";

  // ── Astronomy ────────────────────────────────────────────
  var SYNODIC = 29.53058867;                     // days per lunation
  var EPOCH_NEW = Date.UTC(2000, 0, 6, 18, 14);  // a known new moon
  var DAY_MS = 86400000;

  // Fraction of the lunar cycle [0..1): 0 = new, 0.5 = full.
  function localFraction(t) {
    var d = (t - EPOCH_NEW) / DAY_MS / SYNODIC;
    return d - Math.floor(d);
  }

  var PHASES = [
    { es: "Luna Nueva",        en: "New Moon" },
    { es: "Luna Creciente",    en: "Waxing Crescent" },
    { es: "Cuarto Creciente",  en: "First Quarter" },
    { es: "Gibosa Creciente",  en: "Waxing Gibbous" },
    { es: "Luna Llena",        en: "Full Moon" },
    { es: "Gibosa Menguante",  en: "Waning Gibbous" },
    { es: "Cuarto Menguante",  en: "Last Quarter" },
    { es: "Luna Menguante",    en: "Waning Crescent" }
  ];
  var EN_TO_ES = {};
  PHASES.forEach(function (p) { EN_TO_ES[p.en] = p.es; });
  EN_TO_ES["Third Quarter"] = "Cuarto Menguante";

  function phaseIndex(f) { return Math.round(f * 8) % 8; }

  // ── The oracle: wttr.in, with the stars themselves as fallback ──
  var api = null; // { f, t, nameEn }

  function fromIllumination(ill, waning) {
    var c = Math.min(1, Math.max(-1, 1 - 2 * ill));
    var f = Math.acos(c) / (2 * Math.PI);
    return waning ? 1 - f : f;
  }

  function consultOracle() {
    var ctrl = new AbortController();
    var timer = setTimeout(function () { ctrl.abort(); }, 9000);
    fetch("https://wttr.in/?format=j1", { signal: ctrl.signal })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        clearTimeout(timer);
        var astro = d.weather[0].astronomy[0];
        var name = astro.moon_phase;
        var ill = parseFloat(astro.moon_illumination) / 100;
        var waning = /Waning|Last|Third/i.test(name);
        var now = Date.now();
        var fApi = fromIllumination(ill, waning);
        if (/New/i.test(name)) fApi = 0;
        if (/Full/i.test(name)) fApi = 0.5;
        var fLoc = localFraction(now);
        var drift = Math.abs(fApi - fLoc);
        drift = Math.min(drift, 1 - drift);
        // The API anchors the hand; if it agrees with the ephemeris
        // (within ~1 day) keep the smoother local value.
        api = { f: drift < 0.035 ? fLoc : fApi, t: now, nameEn: name };
        setSource("fase según wttr.in · " + Math.round(ill * 100) + "% iluminada");
        render(true);
      })
      .catch(function () {
        clearTimeout(timer);
        api = null;
        setSource("fase por cálculo astronómico (sin conexión)");
        render(true);
      });
  }

  function currentFraction(t) {
    if (api) {
      var f = api.f + (t - api.t) / DAY_MS / SYNODIC;
      return f - Math.floor(f);
    }
    return localFraction(t);
  }

  // ── SVG helpers ──────────────────────────────────────────
  var NS = "http://www.w3.org/2000/svg";
  function el(name, attrs, parent) {
    var e = document.createElementNS(NS, name);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (parent) parent.appendChild(e);
    return e;
  }
  function $(id) { return document.getElementById(id); }

  // ── Geolocation ──────────────────────────────────────────
  var userLongitude = -15.6; // default: Las Palmas de Gran Canaria
  var hasRequestedLocation = false;

  function updateDialForLocation() {
    var dialRotation = -userLongitude;
    $("ticks").setAttribute("transform", "rotate(" + dialRotation + " 500 500)");
    $("medallions").setAttribute("transform", "rotate(" + dialRotation + " 500 500)");
    render(true);
  }

  function requestUserLocation() {
    if (hasRequestedLocation) return;
    hasRequestedLocation = true;
    if (!navigator.geolocation) return;

    navigator.geolocation.getCurrentPosition(
      function (pos) {
        userLongitude = pos.coords.longitude;
        localStorage.setItem('userLongitude', userLongitude);
        updateDialForLocation();
      },
      function () {
        // Permission denied or error — use default (Las Palmas)
      }
    );
  }

  // Try to load saved location or request one
  var saved = localStorage.getItem('userLongitude');
  if (saved !== null) {
    userLongitude = parseFloat(saved);
  } else {
    requestUserLocation();
  }

  // Point on the dial: fraction f of the cycle, counterclockwise from
  // the top (the Sun) — the way the Moon truly travels, seen from
  // above the North Pole.
  function orbitPoint(f, r) {
    var a = f * 2 * Math.PI;
    return { x: 500 - r * Math.sin(a), y: 500 - r * Math.cos(a) };
  }

  // The lit part of the Moon as seen from Earth (waxing lights the right).
  function litPath(f, r) {
    var i = (1 - Math.cos(2 * Math.PI * f)) / 2; // illuminated fraction
    if (i < 0.015) return "";
    if (i > 0.985) return "M 0 " + (-r) + " A " + r + " " + r + " 0 1 1 0 " + r +
                          " A " + r + " " + r + " 0 1 1 0 " + (-r) + " Z";
    var waxing = f < 0.5;
    var rx = Math.max(0.6, Math.abs(Math.cos(2 * Math.PI * f)) * r);
    var bulgeLit = i < 0.5 ? 0 : 1; // crescent: terminator bends toward lit side
    var outerSweep = waxing ? 1 : 0;
    var termSweep = waxing ? bulgeLit : 1 - bulgeLit;
    return "M 0 " + (-r) +
           " A " + r + " " + r + " 0 0 " + outerSweep + " 0 " + r +
           " A " + rx + " " + r + " 0 0 " + termSweep + " 0 " + (-r) + " Z";
  }

  // ── Build the static ornaments ───────────────────────────
  function buildStars() {
    var g = $("stars");
    for (var i = 0; i < 90; i++) {
      var x = Math.random() * 1000, y = Math.random() * 1000;
      var dc = Math.hypot(x - 500, y - 500);
      if (dc < 330 || (y < 220 && Math.abs(x - 500) < 130)) continue; // keep sky clear of earth/orbit/sun
      var r = Math.random() * 1.6 + 0.5;
      var s = el("circle", { cx: x, cy: y, r: r, fill: "#e8dcc0", opacity: 0.7, "class": "tw" }, g);
      s.style.animationDelay = (Math.random() * 4).toFixed(2) + "s";
      s.style.animationDuration = (2.6 + Math.random() * 3).toFixed(2) + "s";
    }
  }

  function buildTicks() {
    var g = $("ticks");
    for (var d = 1; d < 28; d++) {   // day 0 is marked by the Sun itself
      var f = d / 28;
      var p = orbitPoint(f, 330);
      var big = d % 7 === 0;
      el("circle", {
        cx: p.x, cy: p.y, r: big ? 4 : 2,
        fill: big ? "var(--gold-bright)" : "var(--gold)",
        opacity: big ? 0.95 : 0.55
      }, g);
    }
  }

  function buildMedallions() {
    var g = $("medallions");
    for (var k = 1; k < 8; k++) {           // the Sun itself marks the new moon
      var f = k / 8;
      var p = orbitPoint(f, 405);
      var m = el("g", { transform: "translate(" + p.x + " " + p.y + ")", "data-k": k }, g);
      el("circle", { r: 26, fill: "#161232", stroke: "var(--gold-dim)", "stroke-width": 1 }, m);
      el("path", { d: litPath(f, 21), fill: "#e9dfc4", opacity: 0.9 }, m);
      el("circle", { r: 21, fill: "none", stroke: "var(--gold)", "stroke-width": 0.8, opacity: 0.7 }, m);
    }
  }

  function buildSunRays() {
    var g = $("sunRays");
    for (var i = 0; i < 16; i++) {
      var a = (i / 16) * 2 * Math.PI;
      var straight = i % 2 === 0;
      var r1 = 48, r2 = straight ? 76 : 64;
      var x1 = 500 + r1 * Math.sin(a), y1 = 118 - r1 * Math.cos(a);
      var x2 = 500 + r2 * Math.sin(a), y2 = 118 - r2 * Math.cos(a);
      if (straight) {
        el("line", { x1: x1, y1: y1, x2: x2, y2: y2, "stroke-width": 2.5, "stroke-linecap": "round" }, g);
      } else {
        el("circle", { cx: x2, cy: y2, r: 2.4, stroke: "none" }, g);
      }
    }
  }

  // ── Render loop ──────────────────────────────────────────
  var lastIdx = -1;

  function setSource(txt) { $("source").textContent = txt; }

  function render(force) {
    var now = new Date();
    var t = now.getTime();
    var f = currentFraction(t);

    var dialRotation = -userLongitude;

    // The Moon, hand of the clock — one turn per lunation, counterclockwise
    var deg = f * 360;
    var p = orbitPoint(f, 270);
    var moonHandRot = dialRotation - deg;
    $("moonHand").setAttribute("transform", "rotate(" + moonHandRot + " 500 500)");
    // Rotate moon's position around the dial center by dialRotation
    var angle = dialRotation * Math.PI / 180;
    var dx = p.x - 500;
    var dy = p.y - 500;
    var rotatedDx = dx * Math.cos(angle) - dy * Math.sin(angle);
    var rotatedDy = dx * Math.sin(angle) + dy * Math.cos(angle);
    var moonX = 500 + rotatedDx;
    var moonY = 500 + rotatedDy;
    $("moon").setAttribute("transform", "translate(" + moonX + " " + moonY + ")");

    // The Earth turns on its axis: the meridian at the user's location appears at the top.
    // The user's local noon (when their meridian faces the Sun) is when their spade is at the top.
    var utcH = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
    // Adjust UTC hour to local solar time at user's longitude (1 hour per 15° of longitude)
    var localH = utcH + (userLongitude / 15);
    // Rotate so user's meridian is always at top, then show current local rotation
    var earthRot = dialRotation - ((localH - 12) / 24) * 360;
    $("earthTex").setAttribute("transform", "rotate(" + earthRot + " 500 500)");

    // Texts
    var idx = phaseIndex(f);
    if (idx !== lastIdx || force) {
      lastIdx = idx;
      var es = PHASES[idx].es, en = PHASES[idx].en;
      if (api && api.nameEn && EN_TO_ES[api.nameEn]) { es = EN_TO_ES[api.nameEn]; en = api.nameEn; }
      $("phaseEs").textContent = es;
      $("phaseEn").textContent = en;
      $("portraitLit").setAttribute("d", litPath(f, 28));
      // highlight the medallion of the hour
      var nearest = Math.round(f * 8) % 8;
      var meds = $("medallions").children;
      for (var i = 0; i < meds.length; i++) {
        var mine = +meds[i].getAttribute("data-k") === nearest;
        meds[i].firstChild.setAttribute("stroke", mine ? "var(--gold-bright)" : "var(--gold-dim)");
        meds[i].firstChild.setAttribute("stroke-width", mine ? 2.4 : 1);
      }
    }
    var age = f * SYNODIC;
    var ill = Math.round((1 - Math.cos(2 * Math.PI * f)) / 2 * 100);
    $("detail").textContent = "Día " + (Math.floor(age) + 1) + " del ciclo · " + ill + "% iluminada";
    $("dateLine").textContent = now.toLocaleDateString("es-ES", { day: "numeric", month: "long", year: "numeric" });
  }

  buildStars();
  buildTicks();
  buildMedallions();
  buildSunRays();
  updateDialForLocation();
  consultOracle();
  // The hands barely move (Earth: 0.25°/min, Moon: 0.5°/h) — repainting
  // once a minute keeps the big coastline path cheap on a phone.
  setInterval(render, 60000);
  setInterval(consultOracle, 6 * 3600 * 1000); // renew the oracle four times a day
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) render(true);       // catch up after sleeping in a pocket
  });
})();
</script>
</body>
</html>
